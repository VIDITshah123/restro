name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Execute Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Clone repository if it does not exist, then navigate to it
            if [ ! -d "/home/ubuntu/restro" ]; then
              git clone https://github.com/VIDITshah123/restro.git /home/ubuntu/restro
            fi
            cd /home/ubuntu/restro
            
            # Fetch latest changes so that deploy.sh is updated before running
            git fetch origin main
            git reset --hard origin/main
            
            # Make deploy.sh executable and run it
            chmod +x deploy.sh
            ./deploy.sh
