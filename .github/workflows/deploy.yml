name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Execute Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Clone repository if it does not exist, then navigate to it
            if [ ! -d "/home/ubuntu/restro" ]; then
              git clone https://github.com/VIDITshah123/restro.git /home/ubuntu/restro
            fi
            cd /home/ubuntu/restro

            # Make deploy.sh executable and run it
            # NOTE: restaurant.db is in .gitignore — git reset --hard inside deploy.sh
            # will NEVER delete or overwrite the live database file.
            chmod +x deploy.sh
            ./deploy.sh
